<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Inquilino</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-4">
        <a href="{{ url_for('cobranzas_rentas', view='inquilinos') }}" class="btn btn-outline-secondary mb-3">Volver</a>
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="mb-3">Editar Inquilino</h3>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" class="form-control" value="{{ inquilino.nombre or '' }}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">DNI</label>
                            <input type="text" name="dni" class="form-control" value="{{ inquilino.dni or '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Telefono</label>
                            <input type="text" name="telefono" class="form-control" value="{{ inquilino.telefono or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ inquilino.email or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Inmueble asignado</label>
                            <select name="inmueble_id" class="form-select">
                                <option value="">Sin inmueble (liberar)</option>
                                {% for inmueble in inmuebles %}
                                <option value="{{ inmueble.id }}" {% if inmueble_actual_id == inmueble.id %}selected{% endif %}>
                                    {{ inmueble.codigo }} - {{ inmueble.descripcion or 'Sin descripcion' }} ({{ inmueble.estado or 'N/A' }})
                                </option>
                                {% endfor %}
                            </select>
                            <small class="text-muted">Al guardar, se actualiza el contrato y el estado del inmueble automaticamente.</small>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
