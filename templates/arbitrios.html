<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Arbitrios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <a href="{{ url_for('index') }}" class="btn btn-outline-secondary me-2">Volver al Panel</a>
                {% if editable %}
                <a href="{{ url_for('logout') }}" class="btn btn-secondary">Cerrar Sesión</a>
                {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-primary">Modo Administrador</a>
                {% endif %}
            </div>
            <h2 class="mb-0">Arbitrios</h2>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <p>Sección de Arbitrios. Aquí puede añadir la funcionalidad específica más adelante.</p>
            </div>
        </div>
    </div>
</body>
</html>
