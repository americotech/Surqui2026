<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar entrada – Cronograma 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5" style="max-width:600px">
        <a href="{{ url_for('tributos') }}" class="btn btn-outline-secondary mb-4">← Volver</a>
        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title mb-4">Agregar entrada al Cronograma</h4>
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label">Item (número)</label>
                        <input type="number" name="item" class="form-control" placeholder="Ej: 13">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha de vencimiento</label>
                        <input type="text" name="fecha_vencimiento" class="form-control" placeholder="Ej: 31 de marzo de 2026" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Concepto</label>
                        <input type="text" name="concepto" class="form-control" placeholder="Ej: Predial Cuota 01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Monto total a pagar (S/.)</label>
                        <input type="number" step="0.01" name="monto" class="form-control" placeholder="0.00" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Estado</label>
                        <select name="estado" class="form-select">
                            <option value="">Sin estado</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="Pagado">Pagado</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
