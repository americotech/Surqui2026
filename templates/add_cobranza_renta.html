<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Cobranza de Renta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="{{ url_for('cobranzas_rentas') }}" class="btn btn-outline-secondary mb-4">Volver</a>
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="mb-4">Agregar Cobranza</h3>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Inmueble</label>
                            <select name="inmueble" class="form-select" required>
                                <option value="" disabled selected>Seleccionar inmueble...</option>
                                {% for inmueble in inmuebles %}
                                <option value="{{ inmueble.codigo }}">
                                    {{ inmueble.codigo }}{% if inmueble.descripcion %} - {{ inmueble.descripcion }}{% endif %}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Inquilino</label>
                            <input type="text" name="inquilino" class="form-control" id="inquilino-field" readonly>
                            <small class="text-muted" id="inquilino-status"></small>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Período</label>
                            <input type="text" name="periodo" class="form-control" value="{{ periodo_default }}" placeholder="Ej: 2026-05" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Vencimiento</label>
                            <input type="date" name="vencimiento" class="form-control" value="{{ fecha_default }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Pago</label>
                            <input type="date" name="fecha_pago" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Monto</label>
                            <input type="number" step="0.01" min="0" name="monto" class="form-control" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Monto Pagado</label>
                            <input type="number" step="0.01" min="0" name="monto_pagado" class="form-control" value="0">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Estado</label>
                            <select name="estado" class="form-select">
                                <option value="Pendiente">Pendiente</option>
                                <option value="Parcial">Parcial</option>
                                <option value="Pagado">Pagado</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observación</label>
                            <textarea name="observacion" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">Guardar Cobranza</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Llenar automáticamente el inquilino cuando se selecciona un inmueble
        document.addEventListener('DOMContentLoaded', function() {
            const inmuebleSelect = document.querySelector('select[name="inmueble"]');
            const inquilinoField = document.getElementById('inquilino-field');
            const inquilinoStatus = document.getElementById('inquilino-status');

            inmuebleSelect.addEventListener('change', async function() {
                const codigo = this.value;
                
                if (!codigo) {
                    inquilinoField.value = '';
                    inquilinoStatus.textContent = '';
                    return;
                }

                try {
                    inquilinoStatus.textContent = 'Cargando...';
                    const response = await fetch(`/api/get-inquilino/${encodeURIComponent(codigo)}`);
                    const data = await response.json();
                    
                    if (data.success && data.inquilino) {
                        inquilinoField.value = data.inquilino;
                        inquilinoStatus.textContent = '✓ Inquilino obtenido del contrato activo';
                        inquilinoStatus.style.color = 'green';
                    } else {
                        inquilinoField.value = '';
                        inquilinoStatus.textContent = '✗ ' + (data.message || 'No se encontró inquilino');
                        inquilinoStatus.style.color = 'red';
                    }
                } catch (error) {
                    inquilinoField.value = '';
                    inquilinoStatus.textContent = '✗ Error al obtener inquilino: ' + error.message;
                    inquilinoStatus.style.color = 'red';
                }
            });
        });
    </script>
</body>
</html>
