<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Cobranza de Renta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Oculta spinners del input numerico para que se vea bloqueado */
        #monto-field::-webkit-outer-spin-button,
        #monto-field::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #monto-field {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <a href="{{ url_for('cobranzas_rentas') }}" class="btn btn-outline-secondary mb-4">Volver</a>
        <div class="card shadow-sm">
            <div class="card-body">
                <h3 class="mb-4">Agregar Cobranza</h3>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Inmueble</label>
                            <select name="inmueble" class="form-select" required>
                                <option value="" disabled selected>Seleccionar inmueble...</option>
                                {% for inmueble in inmuebles %}
                                <option value="{{ inmueble.codigo }}">
                                    {{ inmueble.codigo }}{% if inmueble.descripcion %} - {{ inmueble.descripcion }}{% endif %}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Inquilino</label>
                            <input type="text" name="inquilino" class="form-control" id="inquilino-field" readonly>
                            <small class="text-muted" id="inquilino-status"></small>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Período</label>
                            <input type="text" name="periodo" class="form-control" value="{{ periodo_default }}" placeholder="Ej: 2026-05" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Vencimiento</label>
                            <input type="date" name="vencimiento" class="form-control" id="vencimiento-field" value="{{ fecha_default }}" readonly>
                            <small class="text-muted">Se calcula automaticamente segun el período seleccionado.</small>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Fecha Pago</label>
                            <input type="date" name="fecha_pago" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Monto</label>
                            <input type="number" step="0.01" min="0" name="monto" class="form-control" id="monto-field" readonly required>
                            <small class="text-muted">Se completa automaticamente segun el contrato del inmueble.</small>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Monto Pagado</label>
                            <input type="number" step="0.01" min="0" name="monto_pagado" class="form-control" value="0">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Estado</label>
                            <select name="estado" class="form-select">
                                <option value="Pendiente">Pendiente</option>
                                <option value="Parcial">Parcial</option>
                                <option value="Pagado">Pagado</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Observación</label>
                            <textarea name="observacion" class="form-control" rows="2"></textarea>
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-success">Guardar Cobranza</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Llenar automáticamente el inquilino cuando se selecciona un inmueble
        document.addEventListener('DOMContentLoaded', function() {
            const inmuebleSelect = document.querySelector('select[name="inmueble"]');
            const inquilinoField = document.getElementById('inquilino-field');
            const montoField = document.getElementById('monto-field');
            const periodoField = document.querySelector('input[name="periodo"]');
            const vencimientoField = document.getElementById('vencimiento-field');
            const inquilinoStatus = document.getElementById('inquilino-status');

            async function refreshDueDate() {
                const codigo = (inmuebleSelect.value || '').trim();
                const inquilino = (inquilinoField.value || '').trim();
                const periodo = (periodoField.value || '').trim();

                if (!codigo || !inquilino || !periodo) {
                    vencimientoField.value = '';
                    return;
                }

                const params = new URLSearchParams({ inmueble: codigo, inquilino, periodo });
                const response = await fetch(`/api/get-vencimiento-real?${params.toString()}`);
                const data = await response.json();

                vencimientoField.value = data.success ? (data.vencimiento || '') : '';
            }

            periodoField.addEventListener('input', function() {
                refreshDueDate().catch(() => {
                    vencimientoField.value = '';
                });
            });

            inmuebleSelect.addEventListener('change', async function() {
                const codigo = this.value;
                
                if (!codigo) {
                    inquilinoField.value = '';
                    montoField.value = '';
                    vencimientoField.value = '';
                    inquilinoStatus.textContent = '';
                    return;
                }

                try {
                    inquilinoStatus.textContent = 'Cargando...';
                    const response = await fetch(`/api/get-inmueble-data/${encodeURIComponent(codigo)}`);
                    const data = await response.json();
                    
                    if (data.success) {
                        const monto = Number(data.monto_renta || 0);
                        montoField.value = monto.toFixed(2);

                        if (data.inquilino) {
                            inquilinoField.value = data.inquilino;
                            inquilinoStatus.textContent = '✓ Inquilino y monto obtenidos del contrato activo';
                            inquilinoStatus.style.color = 'green';
                        } else {
                            inquilinoField.value = '';
                            inquilinoStatus.textContent = 'Monto cargado, pero no se encontró inquilino activo para calcular vencimiento';
                            inquilinoStatus.style.color = 'orange';
                        }

                        try {
                            await refreshDueDate();
                        } catch (dueDateError) {
                            vencimientoField.value = '';
                        }
                    } else {
                        inquilinoField.value = '';
                        montoField.value = '';
                        vencimientoField.value = '';
                        inquilinoStatus.textContent = '✗ ' + (data.message || 'No se encontró información del inmueble');
                        inquilinoStatus.style.color = 'red';
                    }
                } catch (error) {
                    inquilinoField.value = '';
                    montoField.value = '';
                    vencimientoField.value = '';
                    inquilinoStatus.textContent = '✗ Error al obtener datos del inmueble: ' + error.message;
                    inquilinoStatus.style.color = 'red';
                }
            });
        });
    </script>
</body>
</html>
